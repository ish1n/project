name: ci

on:
  pull_request:
  push:
    branches: ["main", "develop"]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cosmiq-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cosmiq-web/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build

